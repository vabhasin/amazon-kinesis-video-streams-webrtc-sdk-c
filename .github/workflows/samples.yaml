name: WebRTC C Samples

on:
  push:
    branches:
      - develop
      - main
      - 'test-pr-*'
  pull_request:
    branches:
      - develop
      - main

jobs:
  sample-check:
    runs-on: ubuntu-latest
    env:
      AWS_KVS_LOG_LEVEL: 2

    strategy:
      matrix:
        endpoint-type: [ "legacy", "dual-stack" ]

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2.2.0
        with:
          cmake-version: '3.x'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set endpoint type
        run: |
          if [ "${{ matrix.endpoint-type }}" = "dual-stack" ]; then
            echo "Using dual-stack endpoints"
            echo "KVS_DUALSTACK_ENDPOINTS=ON" >> $GITHUB_ENV
          else
            echo "Using legacy endpoints"
          fi

      - name: Build repository
        run: |
          mkdir build && cd build
          cmake .. -DPARALLEL_BUILD=ON
          make -j

      - name: Sample check
        run: |
          ./scripts/check-sample.sh

  sample-check-no-data-channel:
    runs-on: ubuntu-latest
    env:
      AWS_KVS_LOG_LEVEL: 2
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2.2.0
        with:
          cmake-version: '3.x'
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Build repository
        run: |
          sudo sh -c 'echo 0 > /proc/sys/net/ipv6/conf/all/disable_ipv6'
          mkdir build && cd build
          cmake .. -DENABLE_DATA_CHANNEL=OFF -DPARALLEL_BUILD=ON
          make
      - name: Sample check without data channel
        run: |
          ./scripts/check-sample.sh

  sample-check-force-turn:
    runs-on: ubuntu-latest
    env:
      AWS_KVS_LOG_LEVEL: 3
      KVS_ICE_TRANSPORT_POLICY: relay
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2.2.0
        with:
          cmake-version: '3.x'
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Build repository
        run: |
          mkdir build && cd build
          cmake .. -DPARALLEL_BUILD=ON
          make
      - name: Sample check with force TURN
        run: |
          cd build/samples
          ./kvsWebrtcClientMaster SampleChannelForceTurn > master.log 2>&1 &
          MASTER_PID=$!
          sleep 15
          ./kvsWebrtcClientViewer SampleChannelForceTurn > viewer.log 2>&1 &
          VIEWER_PID=$!
          sleep 15

          # Interrupt after 30s, and kill 15s later for safety
          bash -c "sleep 30 && kill -s INT $MASTER_PID $VIEWER_PID" &
          bash -c "sleep 45 && kill -9 $MASTER_PID $VIEWER_PID" &
          wait $MASTER_PID
          MASTER_EXIT=$?
          wait $VIEWER_PID
          VIEWER_EXIT=$?

          if [ $MASTER_EXIT -ne 0 ] || [ $VIEWER_EXIT -ne 0 ]; then
            echo "Sample execution failed. Master exit code: $MASTER_EXIT, Viewer exit code: $VIEWER_EXIT"
            cat master.log
            cat viewer.log
            exit 1
          fi
          if grep "local candidate type: relay. remote candidate type: relay" master.log || \
             grep "local candidate type: relay. remote candidate type: relay" viewer.log; then
            echo "SUCCESS: Force TURN verified - relay candidates selected"
            exit 0
          else
            echo "FAILURE: Expected relay candidate pair not found in logs"
            cat master.log
            cat viewer.log
            exit 1
          fi

  valgrind-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      AWS_KVS_LOG_LEVEL: 7

    permissions:
      id-token: write
      contents: read
    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get -y install valgrind

      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2.2.0
        with:
          cmake-version: '3.x'

      - name: Build repository
        run: |
          mkdir build && cd build
          cmake .. -DUSE_OPENSSL=OFF -DUSE_MBEDTLS=ON -DPARALLEL_BUILD=ON
          make -j

      - name: Run tests
        run: |
          cd build
          valgrind --leak-check=full --show-leak-kinds=all --track-origins=yes --verbose --log-file=valgrind-master.txt ./samples/kvsWebrtcClientMaster demo-channel-gh-actions &
          PID_MASTER=$!
          valgrind --leak-check=full --show-leak-kinds=all --track-origins=yes --verbose --log-file=valgrind-viewer.txt ./samples/kvsWebrtcClientViewer demo-channel-gh-actions &
          PID_VIEWER=$!

          # Wait for processes to run initially
          sleep 30 # Wait 30s

          # Send SIGINT (2) to both processes
          kill -2 $PID_VIEWER
          sleep 30

          kill -2 $PID_MASTER

          # Start a background task to enforce a timeout for graceful shutdown
          (
            sleep 10
            kill -9 $PID_MASTER 2>/dev/null
            kill -9 $PID_VIEWER 2>/dev/null
          ) &

          wait $PID_MASTER
          EXIT_STATUS_MASTER=$?
          wait $PID_VIEWER
          EXIT_STATUS_VIEWER=$?

          # Check exit statuses to determine if the interrupt was successful
          if [ $EXIT_STATUS_MASTER -ne 0 ] || [ $EXIT_STATUS_VIEWER -ne 0 ]; then
            echo "Process did not exit gracefully."
            echo "Master exit code: $EXIT_STATUS_MASTER"
            echo "Viewer exit code: $EXIT_STATUS_VIEWER"
            exit 1
          else

            echo "Processes exited successfully."
          fi

          # Check for memory leaks in Valgrind output files
          LEAK_FOUND=0
          for LOG_FILE in valgrind-master.txt valgrind-viewer.txt; do
            if grep -qE "definitely lost: [^0]" "$LOG_FILE" || grep -qE "indirectly lost: [^0]" "$LOG_FILE"; then
              echo "❌ Valgrind found definitely or indirectly lost memory in $LOG_FILE"
              grep -E "(definitely|indirectly) lost:" "$LOG_FILE"
              LEAK_FOUND=1
            fi
          done
          if [ $LEAK_FOUND -ne 0 ]; then
            cat valgrind-master.txt
            cat valgrind-viewer.txt
            exit 1
          fi
          echo "✅ No definite or indirect memory leaks detected."

  ubuntu-docker-sample-checks:
    name: docker-${{ matrix.runner.id }} - Samples (build_deps=${{ matrix.build-dependencies }})
    runs-on: ubuntu-latest
    container: ${{ matrix.runner.docker }}
    timeout-minutes: 30
    env:
      AWS_KVS_LOG_LEVEL: 1
      KVS_ICE_TRANSPORT_POLICY: relay
      DEBIAN_FRONTEND: noninteractive
    strategy:
      matrix:
        runner:
          - id: ubuntu-20.04
            docker: public.ecr.aws/ubuntu/ubuntu:20.04_stable
          - id: ubuntu-22.04
            docker: public.ecr.aws/ubuntu/ubuntu:22.04_stable
          - id: ubuntu-24.04
            docker: public.ecr.aws/ubuntu/ubuntu:24.04_stable
        build-dependencies: ["ON", "OFF"]
      fail-fast: false

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y git cmake build-essential pkg-config
          if [ "${{ matrix.build-dependencies }}" = "OFF" ]; then
            apt-get install -y libssl-dev libsrtp2-dev libusrsctp-dev
          fi

      - name: Clone repository
        uses: actions/checkout@v6

      - name: Build repository (static frames)
        run: |
          mkdir build && cd build
          cmake .. -DBUILD_DEPENDENCIES=${{ matrix.build-dependencies }} -DBUILD_WEBSOCKETS=ON -DPARALLEL_BUILD=ON
          make -j

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS CLI
        run: |
          apt-get install -y curl unzip
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          ./aws/install

      - name: Run static frames sample (policy=all)
        env:
          KVS_ICE_TRANSPORT_POLICY: all
        run: |
          CHANNEL="ScaryTestChannel-docker-static-${{ matrix.runner.id }}-${{ matrix.build-dependencies }}-all"
          ./scripts/prepare-channel.sh "$CHANNEL"
          ./scripts/run-static-sample.sh "$CHANNEL"

      - name: Run static frames sample (policy=relay)
        run: |
          CHANNEL="ScaryTestChannel-docker-static-${{ matrix.runner.id }}-${{ matrix.build-dependencies }}-relay"
          ./scripts/prepare-channel.sh "$CHANNEL"
          ./scripts/run-static-sample.sh "$CHANNEL"

      - name: Install GStreamer dependencies
        run: |
          apt-get install -y \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            gstreamer1.0-tools

      - name: Build repository (GStreamer)
        run: |
          rm -rf build open-source
          mkdir build && cd build
          cmake .. -DBUILD_DEPENDENCIES=${{ matrix.build-dependencies }} -DBUILD_WEBSOCKETS=ON -DPARALLEL_BUILD=ON
          make -j

      - name: Run GStreamer testsrc sample (policy=all)
        env:
          KVS_ICE_TRANSPORT_POLICY: all
        run: |
          CHANNEL="ScaryTestChannel-docker-gst-${{ matrix.runner.id }}-${{ matrix.build-dependencies }}-all"
          ./scripts/prepare-channel.sh "$CHANNEL"
          ./scripts/run-gst-sample.sh "$CHANNEL"

      - name: Run GStreamer testsrc sample (policy=relay)
        run: |
          CHANNEL="ScaryTestChannel-docker-gst-${{ matrix.runner.id }}-${{ matrix.build-dependencies }}-relay"
          ./scripts/prepare-channel.sh "$CHANNEL"
          ./scripts/run-gst-sample.sh "$CHANNEL"
